<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<style>
  @import url('https://fonts.googleapis.com/css2?family=IBM+Plex+Mono:wght@400;600&family=IBM+Plex+Sans:wght@300;400;600;700&display=swap');
  :root{--bg:#0d0f14;--surface:#141720;--border:#1e2433;--accent:#3b82f6;--accent2:#f59e0b;--accent3:#10b981;--text:#e2e8f0;--muted:#64748b;--pass:#10b981;--fail:#ef4444;--skip:#f59e0b;--andrew:#818cf8;--jesse:#f472b6}
  *{box-sizing:border-box;margin:0;padding:0}
  body{font-family:'IBM Plex Sans',sans-serif;background:var(--bg);color:var(--text);font-size:14px;line-height:1.6}
  .header{background:var(--surface);border-bottom:1px solid var(--border);padding:24px 48px;display:flex;justify-content:space-between;align-items:flex-start}
  .header-left h1{font-size:20px;font-weight:700;color:#fff}.header-left h1 span{color:var(--accent)}
  .header-left p{color:var(--muted);font-size:11px;margin-top:4px;font-family:'IBM Plex Mono',monospace}
  .header-right{text-align:right;font-family:'IBM Plex Mono',monospace;font-size:11px;color:var(--muted);line-height:2}
  .header-right strong{color:var(--accent2)}
  .sync-bar{background:var(--surface);border-bottom:1px solid var(--border);padding:8px 48px;display:flex;align-items:center;gap:16px;font-family:'IBM Plex Mono',monospace;font-size:11px}
  .sync-status{display:flex;align-items:center;gap:6px}
  .sync-dot{width:7px;height:7px;border-radius:50%;background:var(--muted)}
  .sync-dot.synced{background:var(--pass)}.sync-dot.syncing{background:var(--accent2);animation:pulse 1s infinite}.sync-dot.error{background:var(--fail)}
  @keyframes pulse{0%,100%{opacity:1}50%{opacity:0.3}}
  .sync-label{color:var(--muted)}.last-sync{color:var(--muted);font-size:10px}
  .tester-legend{margin-left:auto;display:flex;align-items:center;gap:16px}
  .tester-pill{display:flex;align-items:center;gap:6px;font-size:11px}
  .tester-dot{width:10px;height:10px;border-radius:50%}
  .tester-dot.andrew{background:var(--andrew)}.tester-dot.jesse{background:var(--jesse)}
  .progress-bar-wrap{background:var(--surface);border-bottom:1px solid var(--border);padding:10px 48px;display:flex;align-items:center;gap:16px;position:sticky;top:0;z-index:100}
  .progress-label{font-family:'IBM Plex Mono',monospace;font-size:11px;color:var(--muted);white-space:nowrap}
  .progress-track{flex:1;height:4px;background:var(--border);border-radius:2px;overflow:hidden}
  .progress-fill{height:100%;background:linear-gradient(90deg,var(--accent),var(--accent3));border-radius:2px;transition:width .3s ease;width:0%}
  .progress-count{font-family:'IBM Plex Mono',monospace;font-size:11px;color:var(--text);white-space:nowrap}
  .legend{display:flex;gap:12px;align-items:center}
  .legend-item{display:flex;align-items:center;gap:4px;font-size:11px;color:var(--muted);font-family:'IBM Plex Mono',monospace}
  .dot{width:8px;height:8px;border-radius:50%}.dot.pass{background:var(--pass)}.dot.fail{background:var(--fail)}.dot.skip{background:var(--skip)}
  .container{max-width:1300px;margin:0 auto;padding:40px 48px}
  .section{margin-bottom:48px}
  .section-header{display:flex;align-items:center;gap:12px;margin-bottom:20px;padding-bottom:12px;border-bottom:1px solid var(--border)}
  .section-num{font-family:'IBM Plex Mono',monospace;font-size:11px;color:var(--accent);background:rgba(59,130,246,.1);padding:2px 8px;border-radius:3px;border:1px solid rgba(59,130,246,.2)}
  .section-title{font-size:16px;font-weight:700;color:#fff}
  .section-count{margin-left:auto;font-family:'IBM Plex Mono',monospace;font-size:11px;color:var(--muted)}
  table{width:100%;border-collapse:collapse}
  thead th{font-family:'IBM Plex Mono',monospace;font-size:10px;font-weight:600;text-transform:uppercase;letter-spacing:.08em;color:var(--muted);padding:8px 12px;text-align:left;background:rgba(255,255,255,.02);border-bottom:1px solid var(--border)}
  th.ac{color:var(--andrew)}th.jc{color:var(--jesse)}
  tbody tr{border-bottom:1px solid rgba(255,255,255,.04);transition:background .15s}
  tbody tr:hover{background:rgba(255,255,255,.015)}
  tbody td{padding:8px 12px;vertical-align:top}
  .test-id{font-family:'IBM Plex Mono',monospace;font-size:11px;color:var(--muted);white-space:nowrap}
  .test-name{font-size:13px;color:var(--text);font-weight:600}
  .test-steps{font-size:12px;color:var(--muted);margin-top:4px;line-height:1.5}
  .test-steps ol{padding-left:16px}.test-steps ol li{margin-bottom:2px}
  .expected{font-size:12px;color:var(--accent3);font-family:'IBM Plex Mono',monospace;line-height:1.4}
  .tl{font-family:'IBM Plex Mono',monospace;font-size:10px;font-weight:600;margin-bottom:4px}
  .tl.a{color:var(--andrew)}.tl.j{color:var(--jesse)}
  select.ss{background:var(--bg);border:1px solid var(--border);color:var(--text);padding:3px 6px;border-radius:4px;font-size:11px;font-family:'IBM Plex Mono',monospace;width:100%;cursor:pointer;appearance:none;min-width:90px}
  select.ss.pass{border-color:var(--pass);color:var(--pass);background:rgba(16,185,129,.08)}
  select.ss.fail{border-color:var(--fail);color:var(--fail);background:rgba(239,68,68,.08)}
  select.ss.skip{border-color:var(--skip);color:var(--skip);background:rgba(245,158,11,.08)}
  select.ss:focus{outline:none;border-color:var(--accent)}
  textarea.ni{background:var(--bg);border:1px solid var(--border);color:var(--text);padding:4px 6px;border-radius:4px;font-size:11px;font-family:'IBM Plex Sans',sans-serif;width:100%;min-height:34px;resize:vertical}
  textarea.ni:focus{outline:none;border-color:var(--accent)}
  .pb{font-family:'IBM Plex Mono',monospace;font-size:10px;padding:2px 6px;border-radius:3px;display:inline-block;margin-top:4px}
  .p0{background:rgba(239,68,68,.15);color:#fca5a5;border:1px solid rgba(239,68,68,.3)}
  .p1{background:rgba(245,158,11,.15);color:#fcd34d;border:1px solid rgba(245,158,11,.3)}
  .p2{background:rgba(99,102,241,.15);color:#a5b4fc;border:1px solid rgba(99,102,241,.3)}
  .sub-label{font-size:11px;font-family:'IBM Plex Mono',monospace;color:var(--accent2);background:rgba(245,158,11,.08);border:1px solid rgba(245,158,11,.2);border-radius:3px;padding:1px 6px;display:inline-block;margin-bottom:4px}
  .footer{background:var(--surface);border-top:1px solid var(--border);padding:24px 48px;display:flex;justify-content:space-between;align-items:center;gap:16px}
  .footer-actions{display:flex;gap:12px}
  .btn{padding:8px 16px;border-radius:5px;font-size:12px;font-family:'IBM Plex Mono',monospace;font-weight:600;cursor:pointer;border:none;transition:opacity .2s}
  .btn:hover{opacity:.85}.btn-primary{background:var(--accent);color:#fff}.btn-secondary{background:var(--border);color:var(--text)}.btn-danger{background:rgba(239,68,68,.15);color:#fca5a5;border:1px solid rgba(239,68,68,.3)}
  .summary-stats{display:flex;gap:24px;font-family:'IBM Plex Mono',monospace;font-size:12px}
  .stat{display:flex;flex-direction:column;align-items:center}
  .stat-num{font-size:20px;font-weight:700}.stat-label{font-size:10px;color:var(--muted);text-transform:uppercase;letter-spacing:.08em}
  .stat-pass .stat-num{color:var(--pass)}.stat-fail .stat-num{color:var(--fail)}.stat-skip .stat-num{color:var(--skip)}.stat-pend .stat-num{color:var(--muted)}
</style>
</head>

</div>
<div class="container" id="main-container"></div>

  <div class="footer-actions">

    <button class="btn btn-primary" onclick="forceSync()">Force Sync</button>
    <button class="btn btn-danger" onclick="resetAll()">Reset All</button>
  </div>
</div>

function buildSections(){
  const c=document.getElementById('main-container');
  SECTIONS.forEach(sec=>{
    const d=document.createElement('div');
    d.className='section';
    d.innerHTML=`<div class="section-header"><span class="section-num">${sec.num}</span><span class="section-title">${sec.title}</span><span class="section-count" id="count-${sec.num}"></span></div>
    <table><thead><tr><th style="width:70px">ID</th><th style="width:28%">Test</th><th style="width:20%">Expected Result</th><th class="ac" style="width:60px">Andrew</th><th style="width:90px">Status</th><th>Notes</th><th class="jc" style="width:60px">Jesse</th><th style="width:90px">Status</th><th>Notes</th></tr></thead>
    <tbody>${sec.tests.map(t=>{
      const steps=t.steps.length?`<div class="test-steps"><ol>${t.steps.map(s=>`<li>${s}</li>`).join('')}</ol></div>`:'';
      const sub=t.sub?`<div class="sub-label">${t.sub}</div>`:'';
      return `<tr data-id="${t.id}">
        <td class="test-id">${t.id}<br><span class="pb ${t.p}">${t.p.toUpperCase()}</span></td>
        <td>${sub}<div class="test-name">${t.name}</div>${steps}</td>
        <td class="expected">${t.exp}</td>
        <td><div class="tl a">▸ Andrew</div></td>
        <td><select class="ss" data-tid="${t.id}" data-who="andrew" onchange="hc(this)"><option value="">Pending</option><option value="pass">Pass</option><option value="fail">Fail</option><option value="skip">Skip</option></select></td>
        <td><textarea class="ni" data-tid="${t.id}" data-who="andrew" placeholder="Andrew's notes..." oninput="scheduleSync()"></textarea></td>
        <td><div class="tl j">▸ Jesse</div></td>
        <td><select class="ss" data-tid="${t.id}" data-who="jesse" onchange="hc(this)"><option value="">Pending</option><option value="pass">Pass</option><option value="fail">Fail</option><option value="skip">Skip</option></select></td>
        <td><textarea class="ni" data-tid="${t.id}" data-who="jesse" placeholder="Jesse's notes..." oninput="scheduleSync()"></textarea></td>
      </tr>`;
    }).join('')}</tbody></table>`;
    c.appendChild(d);
  });
}

let syncTimer=null,lastData='',isSyncing=false;
function setSS(s,m){document.getElementById('sync-dot').className='sync-dot '+s;document.getElementById('sync-label').textContent=m;}
function setLS(){document.getElementById('last-sync').textContent='Last sync: '+new Date().toLocaleTimeString();}
function collect(){
  const s={};
  document.querySelectorAll('select.ss').forEach(x=>{const id=x.dataset.tid,w=x.dataset.who;if(!s[id])s[id]={};s[id][w+'_s']=x.value;});
  document.querySelectorAll('textarea.ni').forEach(x=>{const id=x.dataset.tid,w=x.dataset.who;if(!s[id])s[id]={};s[id][w+'_n']=x.value;});
  return s;
}
function apply(state){
  document.querySelectorAll('select.ss').forEach(x=>{const id=x.dataset.tid,w=x.dataset.who;if(state[id]&&state[id][w+'_s']!==undefined){x.value=state[id][w+'_s'];x.className='ss '+(x.value||'');}});
  document.querySelectorAll('textarea.ni').forEach(x=>{const id=x.dataset.tid,w=x.dataset.who;if(state[id]&&state[id][w+'_n']!==undefined)x.value=state[id][w+'_n'];});
  updateStats();
}
async function push(){
  if(isSyncing)return;isSyncing=true;setSS('syncing','Syncing...');
  const s=collect();
  try{await fetch(API_URL,{method:'PUT',headers:{'Content-Type':'application/json','X-Master-Key':API_KEY},body:JSON.stringify({tests:s})});lastData=JSON.stringify(s);setSS('synced','Synced');setLS();}
  catch(e){setSS('error','Sync error');}
  isSyncing=false;
}
async function pull(){
  try{
    const r=await fetch(API_URL+'/latest',{headers:{'X-Master-Key':API_KEY}});
    const j=await r.json();const s=j?.record?.tests||{};const str=JSON.stringify(s);
    if(str!==lastData){apply(s);lastData=str;setLS();setSS('synced','Synced');}
  }catch(e){setSS('error','Connection error');}
}
function hc(sel){sel.className='ss '+(sel.value||'');updateStats();scheduleSync();}
function scheduleSync(){if(syncTimer)clearTimeout(syncTimer);syncTimer=setTimeout(push,1500);}
function forceSync(){push();}
function updateStats(){
  const all=document.querySelectorAll('select.ss');
  let pass=0,fail=0,skip=0,pend=0;
  all.forEach(s=>{if(s.value==='pass')pass++;else if(s.value==='fail')fail++;else if(s.value==='skip')skip++;else pend++;});
  const total=all.length,done=pass+fail+skip;
  document.getElementById('stat-pass').textContent=pass;
  document.getElementById('stat-fail').textContent=fail;
  document.getElementById('stat-skip').textContent=skip;
  document.getElementById('stat-pend').textContent=pend;
  document.getElementById('progress-fill').style.width=total?(done/total*100)+'%':'0%';
  document.getElementById('progress-count').textContent=done+' / '+total;
  SECTIONS.forEach(sec=>{
    const el=document.getElementById('count-'+sec.num);if(!el)return;
    let p=0,f=0,pend=0;
    sec.tests.forEach(t=>{['andrew','jesse'].forEach(w=>{const s=document.querySelector(`select[data-tid="${t.id}"][data-who="${w}"]`);if(!s)return;if(s.value==='pass')p++;else if(s.value==='fail')f++;else pend++;});});
    el.textContent=`${sec.tests.length} tests · ${p} pass · ${f} fail · ${pend} pending`;
  });
}
function resetAll(){
  if(!confirm('Reset ALL results for both Andrew and Jesse? This cannot be undone.'))return;
  document.querySelectorAll('select.ss').forEach(s=>{s.value='';s.className='ss';});
  document.querySelectorAll('textarea.ni').forEach(t=>t.value='');
  push();updateStats();
}
function exportCSV(){
  const rows=[['ID','Test','Andrew Status','Andrew Notes','Jesse Status','Jesse Notes']];
  SECTIONS.forEach(sec=>sec.tests.forEach(t=>{
    const as=document.querySelector(`select[data-tid="${t.id}"][data-who="andrew"]`)?.value||'pending';
    const an='"'+(document.querySelector(`textarea[data-tid="${t.id}"][data-who="andrew"]`)?.value||'').replace(/"/g,'""')+'"';
    const js=document.querySelector(`select[data-tid="${t.id}"][data-who="jesse"]`)?.value||'pending';
    const jn='"'+(document.querySelector(`textarea[data-tid="${t.id}"][data-who="jesse"]`)?.value||'').replace(/"/g,'""')+'"';
    rows.push([t.id,'"'+t.name+'"',as,an,js,jn]);
  }));
  const blob=new Blob([rows.map(r=>r.join(',')).join('\n')],{type:'text/csv'});
  const a=document.createElement('a');a.href=URL.createObjectURL(blob);a.download='MFC-Test-Results.csv';a.click();
}
document.getElementById('test-date').textContent=new Date().toLocaleDateString('en-US',{month:'short',day:'numeric',year:'numeric'});
buildSections();
setSS('syncing','Loading...');
pull().then(()=>{setSS('synced','Synced');setInterval(pull,10000);});
updateStats();
</script>
</body>
</html>
